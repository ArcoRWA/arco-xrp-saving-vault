services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arco_xrp_saving_vault
      POSTGRES_USER: arco
      POSTGRES_PASSWORD: arco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arco -d arco_xrp_saving_vault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
